<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>

:root{
--red:#C0221E;
--blue:#2563EB;
--ink:#14141C;
--white:#FFFFFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:var(--ink);
display:flex;
justify-content:center;
align-items:center;
font-family:'Barlow',sans-serif;
overflow:hidden;
position:relative;
}

.hex{
position:absolute;
width:120px;
height:120px;
opacity:.08;
}

.hex svg{
width:100%;
height:100%;
fill:none;
stroke:white;
stroke-width:2;
}

.hex.red{
top:10%;
left:10%;
stroke:var(--red);
}

.hex.blue{
bottom:12%;
right:12%;
stroke:var(--blue);
}

.wrapper{
text-align:center;
max-width:700px;
padding:40px;
z-index:2;
}

.code{
font-family:'Barlow Condensed',sans-serif;
font-size:clamp(120px,18vw,220px);
font-weight:900;
line-height:.9;
color:white;
}

.code span{
color:var(--red);
}

.line{
width:100px;
height:4px;
margin:25px auto;
background:linear-gradient(90deg,var(--red),var(--blue));
}

h1{
font-family:'Barlow Condensed',sans-serif;
font-size:clamp(32px,4vw,54px);
text-transform:uppercase;
color:white;
margin-bottom:20px;
}

p{
color:rgba(255,255,255,.7);
line-height:1.8;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:16px 36px;
background:var(--red);
color:white;
text-decoration:none;
font-size:12px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
transition:.3s;
}

.btn:hover{
background:var(--blue);
transform:translateY(-3px);
}

</style>
</head>
<body>

<div class="hex red">
<svg viewBox="0 0 100 100">
<path d="M50,2 95,26 95,74 50,98 5,74 5,26 Z"/>
</svg>
</div>

<div class="hex blue">
<svg viewBox="0 0 100 100">
<path d="M50,2 95,26 95,74 50,98 5,74 5,26 Z"/>
</svg>
</div>

<div class="wrapper">

<div class="code">5<span>0</span>0</div>

<div class="line"></div>

<h1>Erreur serveur</h1>

<p>
Une erreur inattendue est survenue sur notre serveur.
Notre équipe technique a été informée et travaille à la résolution du problème.
</p>

<a href="/solutech-web-hero/index.html" class="btn"></div>

</body>
</html>
